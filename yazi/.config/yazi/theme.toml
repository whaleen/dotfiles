# Whaleen theme for Yazi (generated — do not edit by hand)
# Requires yazi 26.x+

[mgr]
cwd = { fg = "#C3A6FF" }

icon_folder  = { fg = "#ffffff" }
icon_file    = { fg = "#A0A0A0" }
icon_command = { fg = "#e6b99d" }

hovered        = { fg = "#101010", bg = "#282828" }
symlink_target = { fg = "#7E7E7E", italic = true }

find_keyword  = { fg = "#C3A6FF", bold = true, italic = true, underline = true }
find_position = { fg = "#e29eca", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "#99FFE4", bg = "#99FFE4" }
marker_cut      = { fg = "#ff8080", bg = "#ff8080" }
marker_marked   = { fg = "#f591b2", bg = "#f591b2" }
marker_selected = { fg = "#C3A6FF", bg = "#C3A6FF" }

count_copied   = { fg = "#101010", bg = "#90b99f" }
count_cut      = { fg = "#101010", bg = "#f5a191" }
count_selected = { fg = "#101010", bg = "#C3A6FF" }

border_symbol = "│"
border_style  = { fg = "#7E7E7E" }

[tabs]
active   = { fg = "#ffffff", bold = true }
inactive = { fg = "#7E7E7E" }

[indicator]
current = { fg = "#101010", bg = "#e6b99d" }
parent  = { fg = "#101010", bg = "#343434" }
preview = { underline = true }

[mode]
normal_main = { fg = "#101010", bg = "#aca1cf",  bold = true }
normal_alt  = { fg = "#aca1cf",  bg = "#232323" }
select_main = { fg = "#101010", bg = "#90b99f", bold = true }
select_alt  = { fg = "#90b99f", bg = "#232323" }
unset_main  = { fg = "#101010", bg = "#f5a191",   bold = true }
unset_alt   = { fg = "#f5a191",   bg = "#232323" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#7E7E7E" }

progress_label  = { bold = true }
progress_normal = { fg = "#aca1cf", bg = "#101010" }
progress_error  = { fg = "#f5a191",  bg = "#101010" }

permissions_t = { fg = "#90b99f" }
permissions_r = { fg = "#e6b99d" }
permissions_w = { fg = "#f5a191" }
permissions_x = { fg = "#ea83a5" }
permissions_s = { fg = "#7E7E7E" }
perm_type     = { fg = "#A0A0A0" }
perm_sep      = { fg = "#505050" }

[spot]
tbl_col  = { fg = "#C3A6FF", bold = true }
tbl_cell = { fg = "#ffffff" }

[notify]
title_info  = { fg = "#aca1cf" }
title_warn  = { fg = "#e6b99d" }
title_error = { fg = "#f5a191" }
icon_info  = ""
icon_warn  = ""
icon_error = ""

[confirm]
title   = { fg = "#C3A6FF", bold = true }
content = { fg = "#ffffff" }
list    = { fg = "#A0A0A0" }
btn_yes = { fg = "#101010", bg = "#90b99f", bold = true }
btn_no  = { fg = "#101010", bg = "#f5a191",   bold = true }

[input]
border   = { fg = "#C3A6FF" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#C3A6FF" }
active   = { fg = "#e29eca", bold = true }
inactive = {}

[completion]
border   = { fg = "#C3A6FF" }
active   = { reversed = true }
inactive = {}

[tasks]
border  = { fg = "#C3A6FF" }
title   = {}
hovered = { fg = "#e29eca", underline = true }

[which]
mask            = { bg = "#101010" }
cand            = { fg = "#ea83a5" }
rest            = { fg = "#7E7E7E" }
desc            = { fg = "#e29eca" }
separator       = "  "
separator_style = { fg = "#7E7E7E" }

[help]
on      = { fg = "#ea83a5" }
run     = { fg = "#e29eca" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#101010", bg = "#A0A0A0" }

[filetype]
rules = [
	{ mime = "image/*",                                        fg = "#ea83a5" },
	{ mime = "{audio,video}/*",                                fg = "#e6b99d" },
	{ mime = "application/*zip*",                              fg = "#e29eca" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#e29eca" },
	{ mime = "application/{pdf,doc,rtf}",                      fg = "#90b99f" },
	{ mime = "text/*",                                         fg = "#A0A0A0" },
	{ mime = "inode/directory",                                fg = "#ffffff" },
	{ url = "*", fg = "#A0A0A0" },
]
